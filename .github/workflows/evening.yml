name: Evening fixtures check (6pm NZ)

on:
  schedule:
    # 6:00 PM NZST (UTC+12) = 06:00 UTC same day
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode — [TEST] emails, no commit, no TeamReach posts"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      post_teamreach:
        description: "Post messages to TeamReach (review email first, then tick this)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  evening-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evening watcher
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TEAMREACH_UID: ${{ secrets.TEAMREACH_UID }}
          TEAMREACH_TOKEN: ${{ secrets.TEAMREACH_TOKEN }}
        run: |
          ARGS="evening"
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          if [ "${{ github.event.inputs.post_teamreach }}" = "true" ]; then
            ARGS="$ARGS --post-teamreach"
          fi
          python -m watcher.main $ARGS

      - name: Push updated files
        if: ${{ github.event.inputs.test_mode != 'true' }}
        run: |
          git config user.name "selwyn-watcher[bot]"
          git config user.email "selwyn-watcher@noreply.github.com"
          git add snapshot.json season_schedule_2ndxi.md season_schedule_13a.md docs/ || true
          git diff --cached --quiet || git commit -m "chore: evening update $(date -u +%Y-%m-%d)"
          git push || true
